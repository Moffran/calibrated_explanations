# CI: Test compat wrapper
# Purpose: Compatibility wrapper to preserve previous `test.yml` behavior during
# CI migration. Will be removed after validation window — see
# docs/improvement/CI-upgrade.md for removal schedule.
name: test (compat wrapper)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  matrix-tests:
    # Skip CI if commit message starts with 'info:'
    if: ${{!startsWith(github.event.head_commit.message, 'info:') && !startsWith(github.event.head_commit.message, 'Info:') && !startsWith(github.event.head_commit.message, 'docs:') && !startsWith(github.event.head_commit.message, 'Docs:')}}
    strategy:
      matrix:
        python-version: ['3.10','3.11','3.12','3.13']
    uses: ./.github/workflows/reusable-python-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      install-mode: dev
      test-command: make test-core

  core-only:
    needs: matrix-tests
    uses: ./.github/workflows/reusable-python-test.yml
    with:
      python-version: '3.11'
      install-mode: core
      test-command: pytest -q -m "not viz" --no-cov

  parity-reference:
    runs-on: ubuntu-latest
    needs: matrix-tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install . -c constraints.txt
          pip install jsonschema -c constraints.txt
      - name: Run parity harness (observed)
        run: |
          python tests/parity_reference/run_parity_reference.py --dataset classification
          python tests/parity_reference/run_parity_reference.py --dataset regression
          python tests/parity_reference/run_parity_reference.py --dataset multiclass
          python tests/parity_reference/run_parity_reference.py --dataset probabilistic_regression
      - name: Run parity harness (prediction)
        run: |
          python tests/parity_reference/run_parity_reference.py --dataset classification --condition-source prediction
          python tests/parity_reference/run_parity_reference.py --dataset regression --condition-source prediction
          python tests/parity_reference/run_parity_reference.py --dataset multiclass --condition-source prediction
          python tests/parity_reference/run_parity_reference.py --dataset probabilistic_regression --condition-source prediction

  viz-only:
    needs: matrix-tests
    uses: ./.github/workflows/reusable-python-test.yml
    with:
      python-version: '3.11'
      install-mode: viz
      test-command: pytest -q -m viz --no-cov

  perf-guard:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: matrix-tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install deps
        run: |
          pip install -r requirements.txt -c constraints.txt
          pip install . psutil -c constraints.txt
      - name: Run micro benchmark
        run: |
          python scripts/micro_bench_perf.py > tests/benchmarks/micro_current.json
      - name: Compare micro metrics with baseline thresholds
        run: |
          python scripts/check_perf_micro.py tests/benchmarks/micro_current.json tests/benchmarks/perf_thresholds.json

  anti-pattern-audit:
    name: Anti-pattern Audit
    needs: matrix-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Run anti-pattern detector
        run: |
          python scripts/detect_test_anti_patterns.py --output reports/test_anti_pattern_report.csv
          if [ -s reports/test_anti_pattern_report.csv ] && [ $(wc -l < reports/test_anti_pattern_report.csv) -gt 1 ]; then
            echo "Anti-pattern violations detected:"; cat reports/test_anti_pattern_report.csv; exit 1; fi
      - name: Upload anti-pattern report
        uses: actions/upload-artifact@v4
        with:
          name: anti-pattern-report
          path: reports/test_anti_pattern_report.csv
