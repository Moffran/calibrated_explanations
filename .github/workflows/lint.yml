# CI: Lint
# Purpose: Run linting, docstring coverage and ADR compliance checks.
# Scope: Runs on relevant code/docs changes; helps enforce Standards/ADRs.
name: Lint

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/quality/**'
      - 'docs/**'
      - 'docs/**.rst'
      - 'docs/**.md'
      - 'docs/conf.py'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/quality/**'
      - 'docs/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            constraints.txt
            pyproject.toml
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] -c constraints.txt
      - name: Ruff naming enforcement (ADR-017)
        run: |
          ruff check --select N
      - name: Notebook naming lint (ADR-018 notebooks)
        run: |
          python -m nbqa ruff notebooks --select N
      - name: pydocstyle (ADR-018 baseline)
        run: |
          pydocstyle src tests
      - name: Docstring coverage report
        run: |
          python scripts/quality/check_docstring_coverage.py --fail-under 94.0 | tee docstring_coverage.txt
      - name: ADR-001 Boundary Check
        run: |
          python scripts/quality/check_import_graph.py
      - name: ADR-002 Compliance Check
        run: |
          python scripts/quality/check_adr002_compliance.py
      - name: Agent instruction consistency
        run: |
          python scripts/quality/check_agent_instruction_consistency.py
      - name: Upload lint artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            docstring_coverage.txt
