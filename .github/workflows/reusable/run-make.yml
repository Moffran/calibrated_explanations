# CI: Reusable — Make runner
# Purpose: Reusable workflow to run `make` targets in a canonical environment.
# Scope: Use for standardizing `make test-core`, baseline generation, or other
# repo targets called from workflows.
name: Reusable Make runner
on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.11'
      target:
        required: false
        type: string
        default: 'test-core'
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Install deps (for make targets)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install -e .[dev,eval] -c constraints.txt

      - name: Run make target
        run: make ${{ inputs.target }}
