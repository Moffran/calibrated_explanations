# CI: Examples QA
# Purpose: Validate examples metadata and smoke-test example snippets.
# Scope: Triggered on example/metadata changes to keep examples and tool descriptions
# in sync.
# NOTE: This workflow is scheduled for decommission and will be removed after the
# CI validation window. See docs/improvement/CI-upgrade.md for the removal schedule.
name: Examples QA

on:
  pull_request:
    paths:
      - 'examples/**'
      - 'METADATA.json'
      - '.ai/**'
  push:
    branches: [ main ]
    paths:
      - 'examples/**'
      - 'METADATA.json'
      - '.ai/**'

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  examples:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pyyaml -c constraints.txt
      - name: Validate metadata and tool description
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import yaml

          metadata = json.loads(Path("METADATA.json").read_text())
          assert metadata.get("name") == "calibrated-explanations"
          assert "WrapCalibratedExplainer" in metadata.get("public_api", [])
          assert metadata.get("required_calibration", False) is True

          example_files = sorted(Path("examples/use_cases").glob("*.py"))
          assert example_files, "No example scripts found in examples/use_cases"
          tool = yaml.safe_load(Path(".ai/tool_description.yaml").read_text())
          assert tool.get("tool_name") == "calibrated_explanations"
          assert tool.get("required_calibration") is True
          print("Metadata/tool description OK; found", len(example_files), "example scripts")
          PY
      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install -e . -c constraints.txt
          pip install scikit-learn pytest pytest-cov -c constraints.txt
      - name: Run example smoke checks
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          scripts = sorted(Path("examples/use_cases").glob("*.py"))
          assert scripts, "No example scripts found in examples/use_cases"

          for script in scripts:
              source = script.read_text(encoding="utf-8")
              compile(source, str(script), "exec")
          print(f"Syntax check passed for {len(scripts)} scripts")

          result = subprocess.run(
              [sys.executable, "examples/use_cases/minimal_quickstart.py"],
              check=True,
              capture_output=True,
              text=True,
          )
          payload = json.loads(result.stdout.strip().splitlines()[-1])
          assert payload.get("scenario") == "minimal_quickstart"
          assert "probability_interval" in payload
          print("minimal_quickstart smoke OK")
          PY
