# CI: Notebook audit
# Purpose: Run notebook audit tooling for notebooks and gallery artifacts.
# Scope: Scheduled and PR-triggered for notebook-related changes; artifacts
# uploaded for inspection. See docs/improvement/CI-upgrade.md.
# NOTE: This workflow is scheduled for decommission and will be removed after the
# CI validation window. See docs/improvement/CI-upgrade.md for the removal schedule.
name: notebook-audit

on:
  push:
    branches: [ main, 'release/*' ]
    paths:
      - 'notebooks/**'
      - 'evaluation/**'
      - 'scripts/**'
  pull_request:
    branches: [ main, 'release/*' ]
    paths:
      - 'notebooks/**'
      - 'evaluation/**'
      - 'scripts/**'

concurrency:
  group: notebook-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run notebook audit
        shell: bash
        run: |
          mkdir -p artifacts
          ARGS="notebooks --json artifacts/notebook_audit.json"

          # Enforce strict mode on release branches
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "Enforcing strict mode for release branch."
            ARGS="$ARGS --check"
          fi

          python scripts/audit_notebook_api.py $ARGS

      - name: Upload audit report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: notebook-audit-report
          path: artifacts/notebook_audit.json
