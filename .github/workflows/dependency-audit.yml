# CI: Dependency audit
# Purpose: Run `pip-audit` to detect vulnerable dependencies. Scheduled and
# runnable manually. Continues on pull_request to avoid blocking contributors.
# NOTE: This workflow is scheduled for decommission and will be removed after the
# CI validation window. See docs/improvement/CI-upgrade.md for the removal schedule.
name: dependency-audit

on:
  pull_request:
    paths:
      - 'requirements.txt'
      - 'constraints.txt'
      - 'pyproject.toml'
      - 'docs/requirements-doc.txt'
      - '.github/workflows/dependency-audit.yml'
  push:
    branches: [ main ]
    paths:
      - 'requirements.txt'
      - 'constraints.txt'
      - 'pyproject.toml'
      - 'docs/requirements-doc.txt'
      - '.github/workflows/dependency-audit.yml'
  workflow_dispatch: {}

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit -c constraints.txt

      - name: Run dependency audit
        run: |
          # GHSA-xm59-rqc7-hhvf has no fixed nbconvert release yet; ignore until patched.
          pip-audit -r requirements.txt -r docs/requirements-doc.txt --ignore-vuln GHSA-xm59-rqc7-hhvf
