# CI: Reusable — Docs builder
# Purpose: Reusable Sphinx build helper for HTML/linkcheck builds.
# Scope: Called by top-level doc workflows to centralize docs build steps.
name: Reusable Docs builder
on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.11'
      build-target:
        required: false
        type: string
        default: 'linkcheck'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            docs/requirements-doc.txt
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-doc.txt -c constraints.txt
          pip install -r requirements.txt -c constraints.txt

      - name: Build docs
        run: |
          cd docs
          sphinx-build -b ${{ inputs.build-target }} . _build/${{ inputs.build-target }}
