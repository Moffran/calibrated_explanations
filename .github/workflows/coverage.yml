# CI: Coverage wrapper
# Purpose: Run coverage for main branch and/or manual execution. Wraps reusable
# python-test runner to centralize coverage invocation. See docs/improvement/CI-upgrade.md.
# NOTE: This workflow is scheduled for decommission and will be removed after the
# CI validation window. See docs/improvement/CI-upgrade.md for the removal schedule.
name: Coverage (wrapper)
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  coverage:
    uses: ./.github/workflows/reusable-python-test.yml
    with:
      python-version: '3.11'
      install-mode: core
      test-command: pytest -q --cov=src --cov-report=xml:coverage.xml --cov-fail-under=90
