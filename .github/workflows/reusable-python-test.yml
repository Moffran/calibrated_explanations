# CI: Reusable — Python + Test job
# Purpose: Reusable workflow for standard Python setup and test execution.
# Scope: Call from top-level entrypoints to centralize install, cache, and
# test invocation conventions. See docs/improvement/CI-upgrade.md.
name: Reusable Python + Test job
on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      install-mode:
        required: false
        type: string
        default: "core"
      test-command:
        required: false
        type: string
        default: "pytest -q"
    # callers may set permissions on their side; this job only needs read
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install core dependencies
        if: ${{ inputs.install-mode == 'core' }}
        run: |
          pip install -r requirements.txt -c constraints.txt
          pip install pytest pytest-cov -c constraints.txt
          pip install -e . -c constraints.txt

      - name: Install viz dependencies
        if: ${{ inputs.install-mode == 'viz' }}
        run: |
          pip install -r requirements.txt -c constraints.txt
          pip install pytest pytest-cov -c constraints.txt
          pip install -e .[viz] -c constraints.txt

      - name: Install dev dependencies
        if: ${{ inputs.install-mode == 'dev' }}
        run: |
          pip install -r requirements.txt -c constraints.txt
          pip install -e .[dev,eval] -c constraints.txt

      - name: Run tests
        run: ${{ inputs.test-command }}
