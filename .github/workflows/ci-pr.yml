# CI: Pull Request checks (fast)
# Purpose: Run fast, required checks for PRs (lint, typechecks, core tests).
# Scope: Lightweight; intended to be required for PR branch-protection during
# validation. See docs/improvement/CI-upgrade.md for migration details.
name: CI — Pull Request checks
on:
  pull_request:
    branches: [ main ]
  push:
    # keep fast checks on pushes to feature branches too (helps local dev loops)
    branches-ignore: [ main ]

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] -c constraints.txt
      - name: Ruff naming enforcement (ADR-017)
        run: ruff check --select N
      - name: Notebook naming lint (ADR-018 notebooks)
        run: python -m nbqa ruff notebooks --select N
      - name: pydocstyle (ADR-018 baseline)
        run: pydocstyle src tests
      - name: Docstring coverage report
        run: python scripts/quality/check_docstring_coverage.py --fail-under 94.0 | tee docstring_coverage.txt
      - name: ADR-001 Boundary Check
        run: python scripts/quality/check_import_graph.py
      - name: ADR-002 Compliance Check
        run: python scripts/quality/check_adr002_compliance.py
      - name: Agent instruction consistency
        run: python scripts/quality/check_agent_instruction_consistency.py
      - name: Logger domain enforcement (ADR-028 / STD-005)
        run: |
          python scripts/quality/check_logging_domains.py \
            --root src/calibrated_explanations \
            --report reports/quality/logging_domain_report.json
      - name: STD-001 nomenclature enforcement
        run: |
          python scripts/quality/check_std001_nomenclature.py \
            --root src/calibrated_explanations \
            --report reports/nomenclature_violation_inventory.json \
            --check
      - name: Generated report local-path guard
        run: |
          python scripts/quality/check_no_local_paths_in_reports.py \
            --check \
            --report reports/quality/no_local_paths_report.json
      - name: Upload lint artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            docstring_coverage.txt
            reports/quality/logging_domain_report.json
            reports/nomenclature_violation_inventory.json
            reports/quality/no_local_paths_report.json

  mypy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install . -c constraints.txt
          pip install mypy -c constraints.txt
      - name: Run mypy (Phase 1B scope)
        shell: bash
        run: |
          set -e
          mypy --version
          FILES=""
          for f in \
            src/calibrated_explanations/core/exceptions.py \
            src/calibrated_explanations/core/validation.py \
            src/calibrated_explanations/api/params.py; do
            if [ -f "$f" ]; then FILES="$FILES $f"; fi
          done
          if [ -z "$FILES" ]; then
            echo "No Phase 1B typed files found; skipping mypy."
            exit 0
          fi
          echo "Checking files:$FILES"
          mypy $FILES --config-file pyproject.toml

  core-tests:
    needs: [lint, mypy]
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    uses: ./.github/workflows/reusable-python-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      install-mode: core
      test-command: pytest -q -m "not viz" --no-cov

  private-member-scan:
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt -c constraints.txt; fi
      - name: Run private-member scan
        run: |
          python scripts/anti-pattern-analysis/scan_private_usage.py tests --check

  anti-pattern-audit:
    name: Anti-pattern Audit (ADR-030)
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Run anti-pattern detector
        run: |
          python scripts/anti-pattern-analysis/detect_test_anti_patterns.py \
            --check \
            --output reports/anti-pattern-analysis/test_anti_pattern_report.csv \
            --report reports/anti-pattern-analysis/test_quality_report.json \
            --baseline .github/test-quality-baseline.json
      - name: Run test-helper export guard
        run: |
          python scripts/quality/check_no_test_helper_exports.py \
            --root src/calibrated_explanations \
            --report reports/anti-pattern-analysis/test_helper_wrapper_report.json
      - name: Run marker hygiene check
        run: |
          python scripts/quality/check_marker_hygiene.py \
            --check \
            --report reports/marker-hygiene/marker_hygiene_report.json \
            --baseline .github/marker-hygiene-baseline.json
      - name: Run generated report local-path guard
        run: |
          python scripts/quality/check_no_local_paths_in_reports.py \
            --check \
            --report reports/quality/no_local_paths_report.json
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-quality-reports
          path: |
            reports/anti-pattern-analysis/test_anti_pattern_report.csv
            reports/anti-pattern-analysis/test_quality_report.json
            reports/anti-pattern-analysis/test_helper_wrapper_report.json
            reports/marker-hygiene/marker_hygiene_report.json
            reports/quality/no_local_paths_report.json

  governance-event-schema-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.filter.outputs.governance }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect governance-event relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            governance:
              - 'src/calibrated_explanations/plugins/registry.py'
              - 'src/calibrated_explanations/governance/**'
              - 'src/calibrated_explanations/schemas/governance_event_schema_v1.json'
              - 'scripts/quality/check_governance_event_schema.py'
              - 'tests/observability/test_governance_events.py'
              - 'tests/scripts/test_check_governance_event_schema.py'
              - 'docs/foundations/governance/governance_events.md'
              - '.github/workflows/ci-pr.yml'

  governance-event-schema:
    name: Governance Event Schema (ADR-028)
    needs: [lint, governance-event-schema-changes]
    if: needs.governance-event-schema-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] -c constraints.txt
      - name: Run governance-event schema checker
        run: python scripts/quality/check_governance_event_schema.py
      - name: Run governance-event tests
        run: pytest -q --no-cov tests/observability/test_governance_events.py tests/scripts/test_check_governance_event_schema.py
