# CI: Pull Request checks (fast)
# Purpose: Run fast, required checks for PRs (lint, typechecks, core tests).
# Scope: Lightweight; intended to be required for PR branch-protection during
# validation. See docs/improvement/CI-upgrade.md for migration details.
name: CI — Pull Request checks
on:
  pull_request:
    branches: [ main ]
  push:
    # keep fast checks on pushes to feature branches too (helps local dev loops)
    branches-ignore: [ main ]

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] -c constraints.txt
      - name: Ruff naming enforcement (ADR-017)
        run: ruff check --select N
      - name: Notebook naming lint (ADR-018 notebooks)
        run: python -m nbqa ruff notebooks --select N
      - name: pydocstyle (ADR-018 baseline)
        run: pydocstyle src tests
      - name: Docstring coverage report
        run: python scripts/quality/check_docstring_coverage.py --fail-under 94.0 | tee docstring_coverage.txt
      - name: ADR-001 Boundary Check
        run: python scripts/quality/check_import_graph.py
      - name: ADR-002 Compliance Check
        run: python scripts/quality/check_adr002_compliance.py
      - name: Upload lint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            docstring_coverage.txt

  mypy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install . -c constraints.txt
          pip install mypy -c constraints.txt
      - name: Run mypy (Phase 1B scope)
        shell: bash
        run: |
          set -e
          mypy --version
          FILES=""
          for f in \
            src/calibrated_explanations/core/exceptions.py \
            src/calibrated_explanations/core/validation.py \
            src/calibrated_explanations/api/params.py; do
            if [ -f "$f" ]; then FILES="$FILES $f"; fi
          done
          if [ -z "$FILES" ]; then
            echo "No Phase 1B typed files found; skipping mypy."
            exit 0
          fi
          echo "Checking files:$FILES"
          mypy $FILES --config-file pyproject.toml

  core-tests:
    needs: [lint, mypy]
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    uses: ./.github/workflows/reusable/python-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      install-mode: core
      test-command: pytest -q -k "not viz"
