# CI: Nightly heavy jobs
# Purpose: Scheduled heavy jobs (parity harness, notebook audits, examples).
# Scope: Runs nightly or on demand; not required for quick PRs. See
# docs/improvement/CI-upgrade.md for rationale and scheduling guidance.
name: CI — Nightly heavy jobs
on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch: {}

concurrency:
  group: ci-nightly
  cancel-in-progress: true

jobs:
  parity-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install . -c constraints.txt
      - name: Run parity harness (observed)
        run: |
          python tests/parity_reference/run_parity_reference.py --dataset classification
          python tests/parity_reference/run_parity_reference.py --dataset regression
          python tests/parity_reference/run_parity_reference.py --dataset multiclass
          python tests/parity_reference/run_parity_reference.py --dataset probabilistic_regression
      - name: Run parity harness (prediction)
        run: |
          python tests/parity_reference/run_parity_reference.py --dataset classification --condition-source prediction
          python tests/parity_reference/run_parity_reference.py --dataset regression --condition-source prediction
          python tests/parity_reference/run_parity_reference.py --dataset multiclass --condition-source prediction
          python tests/parity_reference/run_parity_reference.py --dataset probabilistic_regression --condition-source prediction


  examples-run:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install . -c constraints.txt
      - name: Run examples smoke
        run: |
          mkdir -p artifacts
          pytest examples -q 2>&1 | tee artifacts/examples_smoke.log
      - name: Upload examples logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: examples-smoke-logs
          path: |
            artifacts/examples_smoke.log

  notebook-exec-report:
    # ADR-012: advisory on this dev fork (kristinebergs). Blocking-mode
    # enforcement is the upstream Moffran repo's responsibility at release time.
    # ADR-035: heavy job wired into the approved nightly entrypoint; no
    # standalone workflow.  Installs [notebooks,viz] extras only (ADR-010).
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install notebooks + viz extras
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install ".[notebooks,viz]" -c constraints.txt
      - name: Run notebook execution driver (advisory)
        run: |
          mkdir -p reports/docs
          python scripts/docs/run_notebooks.py \
            --mode advisory \
            --cell-timeout 30 \
            --notebook-timeout 300 \
            --output reports/docs/notebook_execution_report.json
      - name: Upload notebook execution report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: notebook-exec-report
          path: |
            reports/docs/notebook_execution_report.json
