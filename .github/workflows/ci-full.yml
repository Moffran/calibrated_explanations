# CI: Full PR checks (includes viz)
# Purpose: Extended PR validation; runs viz tests and provides a manual parity
# run. Intended for broader PR validation or manual invocation.
# See docs/improvement/CI-upgrade.md for migration and scope.
name: CI — Full PR checks (includes viz)
on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/calibrated_explanations/viz/**'
      - 'src/calibrated_explanations/plotting.py'
      - 'src/calibrated_explanations/plugins/**'
      - 'tests/**/viz/**'
      - 'tests/**/test_plotting.py'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'constraints.txt'
      - '.github/workflows/ci-full.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch: {}

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    uses: ./.github/workflows/reusable-python-test.yml
    with:
      python-version: '3.11'
      install-mode: core
      test-command: pytest -q -k "not viz"

  viz-tests:
    needs: core-tests
    uses: ./.github/workflows/reusable-python-test.yml
    with:
      python-version: '3.11'
      install-mode: viz
      test-command: pytest -q -m viz --no-cov

  parity-reference-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install . -c constraints.txt
      - name: Run parity harness (classification)
        run: |
          python tests/parity_reference/run_parity_reference.py --dataset classification
          python tests/parity_reference/run_parity_reference.py --dataset regression
          python tests/parity_reference/run_parity_reference.py --dataset multiclass
          python tests/parity_reference/run_parity_reference.py --dataset probabilistic_regression
