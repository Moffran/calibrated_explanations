name: ci-policy/validate-workflows
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/ci-policy/**'
      - 'scripts/local_checks.py'
      - 'scripts/quality/validate_ci_policy.py'
      - 'Makefile'
      - '.github/pull_request_template.md'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - '.github/CODEOWNERS'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
            pyproject.toml
      - name: Run CI workflow policy validation (advisory rollout)
        uses: ./.github/actions/ci-policy
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          advisory: 'true'
