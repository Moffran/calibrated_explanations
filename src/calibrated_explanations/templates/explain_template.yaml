reject_indicators:
  ambiguity:
    beginner: "(low confidence - treat with caution)"
    intermediate: "Rejected (ambiguous prediction, {set_size} possible classes)"
    advanced: |
      REJECTED (ambiguous)
      Prediction Set: {prediction_set} (size: {set_size})
      Confidence: {confidence}
      Interpretation: The model cannot confidently distinguish between the listed classes at the given confidence level.
  novelty:
    beginner: "(unknown pattern - predictions unreliable)"
    intermediate: "Rejected (novel instance, outside training distribution)"
    advanced: |
      REJECTED (novel)
      Prediction Set: {} (empty)
      Confidence: {confidence}
      Interpretation: The instance lies outside the training distribution; no class exceeds the p-value threshold.

narrative_templates:
  binary_classification:
    factual:
      beginner: |
        Prediction: {label}
        Calibrated Probability: {calibrated_pred}

        Factors impacting the probability for class {positive_label} positively:
        * {feature_name} ({feature_actual_value}) {condition}

        Factors impacting the probability for class {positive_label} negatively:
        * {feature_name} ({feature_actual_value}) {condition}

      intermediate: |
        Prediction: {label}
        Calibrated Probability: {calibrated_pred} [{pred_interval_lower}, {pred_interval_upper}]

        Factors impacting the calibrated probability for class {positive_label} positively:
        * {feature_name} ({feature_actual_value}) {condition} — weight ≈ {feature_weight}

        Factors impacting the calibrated probability for class {positive_label} negatively:
        * {feature_name} ({feature_actual_value}) {condition} — weight ≈ {feature_weight}

      advanced: |
        Prediction: {label}
        Calibrated Probability: {calibrated_pred}
        Prediction Interval: [{pred_interval_lower}, {pred_interval_upper}]

        Factors impacting the calibrated probability for class {positive_label} positively:
        {feature_name} ({feature_actual_value}) {condition} — weight ≈ {feature_weight} [{feature_weight_low}, {feature_weight_high}]

        Factors impacting the calibrated probability for class {positive_label} negatively:
        {feature_name} ({feature_actual_value}) {condition} — weight ≈ {feature_weight} [{feature_weight_low}, {feature_weight_high}]

    alternative:
